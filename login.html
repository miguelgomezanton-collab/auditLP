<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Legal Pigeon · Auditoría Interna</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:         #06090f;
    --surface:    #0c1220;
    --border:     #162040;
    --border2:    #1e2e55;
    --blue-deep:  #1a3068;
    --blue-main:  #1e3a8a;
    --blue-mid:   #2952b3;
    --blue-light: #4a7fd4;
    --blue-pale:  #8ab0e8;
    --text:       #e8edf5;
    --text2:      #8090a8;
    --muted:      #3a4a66;
    --accent:     #4a7fd4;
    --error:      #e05c5c;
    --green:      #4abf8a;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(74,127,212,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(74,127,212,0.04) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
  }

  body::after {
    content: '';
    position: fixed;
    top: -10%;
    left: 50%;
    transform: translateX(-50%);
    width: 700px;
    height: 500px;
    background: radial-gradient(ellipse, rgba(30,58,138,0.18) 0%, transparent 65%);
    pointer-events: none;
  }

  .wrap {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 400px;
    padding: 0 24px;
    animation: fadeUp 0.55s cubic-bezier(.22,1,.36,1) both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .logo-area {
    text-align: center;
    margin-bottom: 36px;
  }

  .logo-img {
    height: 52px;
    width: auto;
    filter: brightness(0) invert(1);
    opacity: 0.92;
    margin-bottom: 18px;
    display: block;
    margin-left: auto;
    margin-right: auto;
  }

  .platform-label {
    display: inline-block;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.20em;
    text-transform: uppercase;
    color: var(--blue-pale);
    border: 1px solid var(--border2);
    padding: 4px 12px;
    border-radius: 20px;
    background: rgba(74,127,212,0.06);
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 32px 28px;
    box-shadow: 0 24px 60px rgba(0,0,0,0.4), 0 0 0 1px rgba(74,127,212,0.06);
  }

  .card-title {
    font-size: 15px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 4px;
  }

  .card-sub {
    font-size: 11px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    margin-bottom: 26px;
  }

  .divider {
    height: 1px;
    background: var(--border);
    margin-bottom: 22px;
  }

  .field { margin-bottom: 14px; }

  .field label {
    display: block;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text2);
    margin-bottom: 7px;
  }

  .field input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 11px 14px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .field input:focus {
    border-color: var(--blue-mid);
    box-shadow: 0 0 0 3px rgba(41,82,179,0.15);
  }

  .field input::placeholder { color: var(--muted); }

  .btn {
    width: 100%;
    margin-top: 6px;
    padding: 12px;
    background: var(--blue-main);
    color: #e8edf5;
    border: none;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    position: relative;
    overflow: hidden;
  }

  .btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.06) 0%, transparent 60%);
    pointer-events: none;
  }

  .btn:hover { background: var(--blue-mid); }
  .btn:active { transform: scale(0.99); }

  .error-msg {
    margin-top: 12px;
    padding: 10px 14px;
    background: rgba(224,92,92,0.07);
    border: 1px solid rgba(224,92,92,0.18);
    border-radius: 7px;
    font-size: 11px;
    color: var(--error);
    display: none;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.04em;
  }

  .footer {
    text-align: center;
    margin-top: 20px;
    font-size: 10px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.08em;
  }

  .success-overlay {
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 100;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s;
  }

  .success-overlay.show { opacity: 1; pointer-events: all; }

  .success-ring {
    width: 52px; height: 52px;
    border: 1.5px solid var(--blue-light);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    animation: ringPulse 1.4s ease infinite;
  }

  @keyframes ringPulse {
    0%,100% { box-shadow: 0 0 0 0 rgba(74,127,212,0.3); }
    50%      { box-shadow: 0 0 0 8px rgba(74,127,212,0); }
  }

  .success-ring svg {
    width: 20px; height: 20px;
    stroke: var(--blue-light);
    fill: none; stroke-width: 2;
    stroke-linecap: round; stroke-linejoin: round;
  }

  .success-overlay p {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text2);
    letter-spacing: 0.12em;
  }
</style>
</head>

  <div class="card">
    <div class="card-title">Acceder a la plataforma</div>
    <div class="card-sub">Acceso restringido · Solo personal autorizado</div>
    <div class="divider"></div>

    <div class="field">
      <label>Usuario</label>
      <input type="text" id="user-input" placeholder="usuario" autocomplete="username">
    </div>
    <div class="field">
      <label>Contraseña</label>
      <input type="password" id="pass-input" placeholder="••••••••" autocomplete="current-password">
    </div>

    <button class="btn" onclick="doLogin()">Entrar →</button>
    <div class="error-msg" id="err-msg">Credenciales incorrectas</div>
  </div>

  <div class="footer">Legal Pigeon S.L. · Uso interno · Acceso restringido</div>
</div>

<div class="success-overlay" id="success">
  <div class="success-ring">
    <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
  </div>
  <p>Acceso concedido · Cargando plataforma...</p>
</div>

<script>
  const CREDS = [
    { user: 'admin',  pass: 'lp2024' },
    { user: 'cindy',  pass: 'lp2024' },
    { user: 'guille', pass: 'lp2024' },
  ];

  document.querySelectorAll('input').forEach(i =>
    i.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); })
  );

  function doLogin() {
    const u = document.getElementById('user-input').value.trim().toLowerCase();
    const p = document.getElementById('pass-input').value;
    const err = document.getElementById('err-msg');
    const ok = CREDS.some(c => c.user === u && c.pass === p);
    if (ok) {
      err.style.display = 'none';
      sessionStorage.setItem('lp_user', u);
      document.getElementById('success').classList.add('show');
      setTimeout(() => { window.location.href = 'index.html'; }, 1800);
    } else {
      err.style.display = 'block';
      document.getElementById('pass-input').value = '';
      document.getElementById('pass-input').focus();
    }
  }
</script>
