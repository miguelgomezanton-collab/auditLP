<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LPAUDIT · Cuentas Contables</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap');

  :root {
    --bg: #06090f;
    --surface: #0c1220;
    --surface2: #101828;
    --border: #162040;
    --accent: #4a7fd4;
    --accent2: #2952b3;
    --ok: #3ecf8e;
    --warn: #f5a623;
    --error: #f06464;
    --text: #e8e8f0;
    --text2: #7888a0;
    --text3: #3a4a66;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    font-size: 14px;
  }

  /* HEADER */
  header {
    padding: 28px 40px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .logo-badge {
    background: var(--accent);
    color: #fff;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.12em;
    padding: 4px 10px;
    border-radius: 4px;
  }
  header h1 {
    font-size: 18px;
    font-weight: 500;
    color: var(--text);
    letter-spacing: -0.01em;
  }
  header span {
    color: var(--text3);
    font-size: 13px;
    margin-left: auto;
    font-family: 'DM Mono', monospace;
  }

  /* UPLOAD ZONE */
  .upload-section {
    padding: 40px;
    max-width: 700px;
    margin: 0 auto;
  }
  .upload-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 12px;
    display: block;
  }
  .drop-zone {
    border: 1.5px dashed var(--border);
    border-radius: 10px;
    padding: 40px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    background: var(--surface);
  }
  .drop-zone:hover, .drop-zone.drag-over {
    border-color: var(--accent);
    background: rgba(124,106,247,0.06);
  }
  .drop-zone input { display: none; }
  .drop-icon {
    font-size: 32px;
    margin-bottom: 12px;
    opacity: 0.5;
  }
  .drop-zone p {
    color: var(--text2);
    font-size: 13px;
    line-height: 1.6;
  }
  .drop-zone strong {
    color: var(--accent);
    cursor: pointer;
  }
  .file-loaded {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 18px;
    background: rgba(62,207,142,0.08);
    border: 1px solid rgba(62,207,142,0.25);
    border-radius: 8px;
    margin-top: 12px;
  }
  .file-loaded .icon { font-size: 20px; }
  .file-loaded .name { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--ok); }
  .file-loaded .rows { font-size: 12px; color: var(--text3); margin-left: auto; }

  .run-btn {
    margin-top: 24px;
    width: 100%;
    padding: 14px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s;
    letter-spacing: 0.02em;
  }
  .run-btn:hover { opacity: 0.85; }
  .run-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  /* results wrapper */
  #results { display: none; }

  /* SUMMARY CARDS */
  .summary-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 12px;
    margin-bottom: 40px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px 20px;
  }
  .stat-card .label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 8px;
  }
  .stat-card .value {
    font-family: 'DM Mono', monospace;
    font-size: 26px;
    font-weight: 600;
    line-height: 1;
  }
  .stat-card .value.ok { color: var(--ok); }
  .stat-card .value.error { color: var(--error); }
  .stat-card .value.warn { color: var(--warn); }
  .stat-card .value.neutral { color: var(--accent2); }
  .stat-card .sub {
    font-size: 11px;
    color: var(--text3);
    margin-top: 6px;
  }

  /* SECTION TABS (top level) */
  .section-tabs {
    display: flex;
    gap: 0;
    border-bottom: 2px solid var(--border);
    margin-bottom: 36px;
    padding: 0;
  }
  .section-tab {
    padding: 13px 28px;
    font-size: 13px;
    font-weight: 600;
    color: var(--text3);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -2px;
    transition: all 0.15s;
    white-space: nowrap;
    letter-spacing: 0.01em;
  }
  .section-tab:hover { color: var(--text2); }
  .section-tab.active { color: var(--text); border-bottom-color: var(--accent); }
  .section-panel { display: none; }
  .section-panel.active { display: block; }

  /* TABS */
  .tabs {
    display: flex;
    gap: 4px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 28px;
    flex-wrap: wrap;
  }
  .tab {
    padding: 10px 18px;
    font-size: 13px;
    font-weight: 500;
    color: var(--text3);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .tab:hover { color: var(--text2); }
  .tab.active { color: var(--text); border-bottom-color: var(--accent); }
  .tab .badge {
    font-size: 10px;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 20px;
    font-family: 'DM Mono', monospace;
  }
  .badge.ok-badge { background: rgba(62,207,142,0.15); color: var(--ok); }
  .badge.error-badge { background: rgba(240,100,100,0.15); color: var(--error); }

  /* TAB PANELS */
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* CHECK HEADER */
  .check-header {
    display: flex;
    align-items: flex-start;
    gap: 16px;
    padding: 18px 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px 10px 0 0;
    margin-bottom: 0;
  }
  .check-icon { font-size: 20px; flex-shrink: 0; margin-top: 2px; }
  .check-header h3 { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
  .check-header p { font-size: 12px; color: var(--text2); line-height: 1.5; }
  .check-status {
    margin-left: auto;
    font-size: 12px;
    font-weight: 700;
    padding: 4px 12px;
    border-radius: 6px;
    font-family: 'DM Mono', monospace;
    white-space: nowrap;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .status-ok { background: rgba(62,207,142,0.12); color: var(--ok); }
  .status-error { background: rgba(240,100,100,0.12); color: var(--error); }

  /* TABLE */
  .table-wrap {
    border: 1px solid var(--border);
    border-top: none;
    border-radius: 0 0 10px 10px;
    overflow: hidden;
    margin-bottom: 28px;
  }
  .table-wrap.empty-ok {
    padding: 28px;
    text-align: center;
    color: var(--ok);
    font-size: 13px;
    font-weight: 500;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }
  .no-issues { font-size: 20px; }

  .search-bar {
    padding: 10px 16px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 10px;
    align-items: center;
  }
  .search-bar input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
  }
  .search-bar input::placeholder { color: var(--text3); }
  .search-count { font-size: 11px; color: var(--text3); white-space: nowrap; font-family: 'DM Mono', monospace; }

  table {
    width: 100%;
    border-collapse: collapse;
  }
  thead th {
    padding: 10px 14px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text3);
    text-align: left;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
  }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: rgba(255,255,255,0.02); }
  tbody td {
    padding: 9px 14px;
    font-size: 12px;
    color: var(--text2);
    vertical-align: middle;
  }
  tbody td.mono {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
  }
  tbody td.highlight { color: var(--text); font-weight: 500; }
  .chip {
    display: inline-block;
    font-size: 10px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 4px;
    font-family: 'DM Mono', monospace;
    white-space: nowrap;
  }
  .chip-error { background: rgba(240,100,100,0.12); color: var(--error); }
  .chip-warn { background: rgba(245,166,35,0.12); color: var(--warn); }
  .chip-ok { background: rgba(62,207,142,0.12); color: var(--ok); }

  .loading {
    text-align: center;
    padding: 60px;
    color: var(--text3);
    font-size: 13px;
  }
  .spinner {
    display: inline-block;
    width: 20px; height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .section-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 16px;
    margin-top: 36px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }
  .section-title:first-child { margin-top: 0; }

  /* PAGINATION */
  .pagination {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    background: var(--surface2);
    border-top: 1px solid var(--border);
    font-size: 12px;
    color: var(--text3);
  }
  .pagination button {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text2);
    padding: 4px 12px;
    border-radius: 5px;
    cursor: pointer;
    font-size: 12px;
    transition: all 0.15s;
  }
  .pagination button:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
  .pagination button:disabled { opacity: 0.3; cursor: not-allowed; }

  .export-btn {
    display: none;
    align-items: center;
    gap: 8px;
    padding: 8px 18px;
    background: transparent;
    border: 1.5px solid var(--ok);
    color: var(--ok);
    border-radius: 7px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .export-btn:hover { background: rgba(62,207,142,0.1); }
  .export-btn.visible { display: flex; }
</style>
</head>
<body>

<div style="background:#0c1220;border-bottom:1px solid #162040;padding:11px 24px;display:flex;align-items:center;gap:12px;flex-shrink:0;width:100%;box-sizing:border-box;"><span style="font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.16em;text-transform:uppercase;color:#4a7fd4;font-weight:500;">Cuentas Contables</span><span style="font-family:'DM Mono',monospace;font-size:9px;color:#3a4a66;margin-left:4px;">· Legal Pigeon Auditoría Interna</span><span id="period-label" style="margin-left:auto;font-family:'DM Mono',monospace;font-size:11px;color:#4a7fd4;"></span><button id="export-btn" onclick="exportToExcel()" style="margin-left:12px;padding:6px 14px;background:#1e3a8a;border:1px solid #2952b3;border-radius:6px;color:#8ab0e8;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.08em;cursor:pointer;display:none;transition:background 0.2s;" onmouseover="this.style.background='#2952b3'" onmouseout="this.style.background='#1e3a8a'">⬇ Exportar incidencias</button></div>

<div class="upload-section" id="upload-section">
  <label class="upload-label">Libro Diario (Holded)</label>
  <div class="drop-zone" id="drop-zone">
    <input type="file" id="file-input" accept=".xlsx,.xls">
    <div class="drop-icon">📂</div>
    <p>Arrastra el Excel del <strong onclick="document.getElementById('file-input').click()">Libro Diario</strong> aquí<br>
    o haz clic para seleccionarlo</p>
  </div>
  <div id="file-info" style="display:none"></div>
  <button class="run-btn" id="run-btn" disabled onclick="runAnalysis()">Analizar →</button>
</div>

<div id="results">
  <div id="loading-msg" class="loading">
    <div><div class="spinner"></div></div>
    Procesando libro diario…
  </div>
  <div id="analysis-content" style="display:none; padding: 0 40px 60px; max-width: 1200px; margin: 0 auto;">

    <div class="section-tabs">
      <div class="section-tab active" onclick="switchSection('s-cuentas')">Cuentas Contables</div>
      <div class="section-tab" onclick="switchSection('s-adicional')">Auditoría Adicional</div>
      <div class="section-tab" onclick="switchSection('s-duplicados')">Facturas Duplicadas Pigeon</div>
    </div>

    <div class="section-panel active" id="s-cuentas">
      <div class="section-title" style="padding: 0 0 8px; margin-bottom: 20px;">Resumen</div>
      <div class="summary-grid" id="summary-grid"></div>
      <div class="tabs" id="tabs-bar"></div>
      <div id="tabs-content"></div>
    </div>

    <div class="section-panel" id="s-adicional">
      <div class="section-title" style="padding: 0 0 8px; margin-bottom: 20px;">Resumen</div>
      <div class="summary-grid" id="summary-grid-adicional"></div>
      <div class="tabs" id="tabs-bar-adicional"></div>
      <div id="tabs-content-adicional"></div>
    </div>

    <div class="section-panel" id="s-duplicados">
      <div class="section-title" style="padding: 0 0 8px; margin-bottom: 20px;">Resumen</div>
      <div class="summary-grid" id="summary-grid-dup"></div>
      <div class="tabs" id="tabs-bar-dup"></div>
      <div id="tabs-content-dup"></div>
    </div>

  </div>
</div>

<script>
let rawData = [];
let analysisResult = null;
const PAGE_SIZE = 50;

// ─── EXPORT TO EXCEL ───────────────────────────────────────────────────────
function exportToExcel() {
  if (!analysisResult) return;

  const wb = XLSX.utils.book_new();
  const period = document.getElementById('period-label').textContent || 'periodo';

  // Helper: convert issues array to worksheet rows
  function issuesToRows(check) {
    if (check.issues.length === 0) return null;

    if (check.isCustom) {
      // For custom checks, build rows from known fields based on check id
      const id = check.id;

      if (id === 'a1') {
        const header = ['Asiento','Fecha','Tipo','Descripción','Debe','Haber','Diferencia','Líneas'];
        const rows = check.issues.map(r => [r.asiento, r.fecha, r.tipo, r.desc, r.debe, r.haber, r.diff, r.lineas]);
        return [header, ...rows];
      }
      if (id === 'c1' || id === 'c2') {
        const header = ['Asiento','Fecha','Tipo','Descripción','Cuentas del asiento'];
        const rows = check.issues.map(r => [r.asiento, r.fecha, r.tipo, r.desc, r.cuentas]);
        return [header, ...rows];
      }
      if (id === 'c3') {
        const header = ['Asiento','Fecha','Cuenta','Descripción','Tipo IVA','Base (desc.)','IVA esperado','IVA contabilizado','Diferencia'];
        const rows = check.issues.map(r => [r.asiento, r.fecha, r.cuenta, r.desc, r.tipoPct, r.baseDesc, r.ivaEsperado, r.ivaContab, r.diff]);
        return [header, ...rows];
      }
      if (id === 'd1' || id === 'd2' || id === 'd3') {
        const header = ['Asiento','Fecha','Proveedor','Cuenta','Importe','Documento','Ocurrencias','Descripción'];
        const rows = check.issues.map(r => [r.asiento, r.fecha, r.proveedor, r.provCuenta, r.importe, r.doc, r.nGrupo || '', r.desc]);
        return [header, ...rows];
      }
      // fallback: try to serialize object keys
      if (check.issues.length > 0) {
        const header = Object.keys(check.issues[0]).filter(k => k !== 'nGrupo' || true);
        const rows = check.issues.map(r => header.map(k => r[k]));
        return [header, ...rows];
      }
      return null;
    }

    // Standard checks with cols
    const header = check.cols.map(c => c.label);
    const rows = check.issues.map(r => check.cols.map(c => c.fn(r)));
    return [header, ...rows];
  }

  // Tab name helper (max 31 chars, no special chars)
  function sheetName(str) {
    return str.replace(/[:\\\/\?\*\[\]]/g, '').substring(0, 31);
  }

  let totalSheets = 0;

  // ── Sección 1: Cuentas Contables ──
  analysisResult.checks.forEach((check, i) => {
    const data = issuesToRows(check);
    if (!data) return;
    const ws = XLSX.utils.aoa_to_sheet(data);
    styleSheet(ws, data[0].length);
    XLSX.utils.book_append_sheet(wb, ws, sheetName(`CC${i+1} ${check.title.substring(0,20)}`));
    totalSheets++;
  });

  // ── Sección 2: Auditoría Adicional ──
  analysisResult.adicional.checks.forEach((check) => {
    const data = issuesToRows(check);
    if (!data) return;
    const ws = XLSX.utils.aoa_to_sheet(data);
    styleSheet(ws, data[0].length);
    XLSX.utils.book_append_sheet(wb, ws, sheetName(`AD ${check.title.substring(0,25)}`));
    totalSheets++;
  });

  // ── Sección 3: Duplicados Pigeon ──
  analysisResult.duplicados.checks.forEach((check) => {
    const data = issuesToRows(check);
    if (!data) return;
    const ws = XLSX.utils.aoa_to_sheet(data);
    styleSheet(ws, data[0].length);
    XLSX.utils.book_append_sheet(wb, ws, sheetName(`DUP ${check.title.substring(0,24)}`));
    totalSheets++;
  });

  // ── Portada resumen ──
  const now = new Date().toLocaleDateString('es-ES');
  const allChecks = [
    ...analysisResult.checks.map(c => ({ seccion: 'Cuentas Contables', ...c })),
    ...analysisResult.adicional.checks.map(c => ({ seccion: 'Auditoría Adicional', ...c })),
    ...analysisResult.duplicados.checks.map(c => ({ seccion: 'Facturas Duplicadas', ...c }))
  ];
  const resumenData = [
    ['LPAUDIT — Exportación de incidencias'],
    [`Período: ${period}`],
    [`Generado: ${now}`],
    [],
    ['Sección', 'Control', 'Incidencias', 'Estado'],
    ...allChecks.map(c => [
      c.seccion,
      c.title,
      c.issues.length,
      c.issues.length === 0 ? '✓ OK' : '⚠ Revisar'
    ]),
    [],
    ['Total incidencias', '', allChecks.reduce((s,c) => s + c.issues.length, 0), '']
  ];
  const wsResumen = XLSX.utils.aoa_to_sheet(resumenData);
  wsResumen['!cols'] = [{ wch: 22 }, { wch: 45 }, { wch: 14 }, { wch: 12 }];
  XLSX.utils.book_append_sheet(wb, wsResumen, 'Resumen');
  // Move resumen to first position
  wb.SheetNames = ['Resumen', ...wb.SheetNames.filter(n => n !== 'Resumen')];

  if (totalSheets === 0) {
    alert('¡No hay incidencias que exportar! Todo está limpio ✓');
    return;
  }

  const filename = `LPAUDIT_${period.replace(/[\s\/]/g, '_')}_${now.replace(/\//g,'')}.xlsx`;
  XLSX.writeFile(wb, filename);
}

function styleSheet(ws, nCols) {
  // Set column widths
  ws['!cols'] = Array(nCols).fill({ wch: 20 });
  if (ws['!cols'][0]) ws['!cols'][0] = { wch: 10 }; // Asiento
  if (ws['!cols'][1]) ws['!cols'][1] = { wch: 12 }; // Fecha
}
function switchSection(id) {
  const ids = ['s-cuentas', 's-adicional', 's-duplicados'];
  document.querySelectorAll('.section-tab').forEach((t, i) => t.classList.toggle('active', ids[i] === id));
  document.querySelectorAll('.section-panel').forEach(p => p.classList.toggle('active', p.id === id));
}

// ─── DROP ZONE ─────────────────────────────────────────────────────────────
const dz = document.getElementById('drop-zone');
const fi = document.getElementById('file-input');

dz.addEventListener('click', () => fi.click());
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag-over'); });
dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
dz.addEventListener('drop', e => {
  e.preventDefault();
  dz.classList.remove('drag-over');
  handleFile(e.dataTransfer.files[0]);
});
fi.addEventListener('change', () => handleFile(fi.files[0]));

function handleFile(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const wb = XLSX.read(e.target.result, { type: 'array', cellDates: true });
    const ws = wb.Sheets[wb.SheetNames[0]];
    const raw = XLSX.utils.sheet_to_json(ws, { header: 1 });
    let headerIdx = raw.findIndex(r => r.some(c => String(c).trim() === 'Asiento'));
    if (headerIdx === -1) { alert('No se encontró la cabecera del libro diario.'); return; }
    const headers = raw[headerIdx].map(h => String(h || '').trim());
    rawData = raw.slice(headerIdx + 1)
      .filter(r => r.some(c => c !== null && c !== undefined && c !== ''))
      .map(r => {
        const obj = {};
        headers.forEach((h, i) => obj[h] = r[i] !== undefined ? r[i] : '');
        return obj;
      });
    let period = '';
    for (let i = 0; i < Math.min(4, raw.length); i++) {
      const v = String(raw[i][0] || '');
      if (v.includes('/') && v.includes('-')) { period = v.trim(); break; }
    }
    document.getElementById('period-label').textContent = period || file.name;
    document.getElementById('file-info').style.display = 'flex';
    document.getElementById('file-info').innerHTML = `
      <div class="file-loaded">
        <span class="icon">✅</span>
        <span class="name">${file.name}</span>
        <span class="rows">${rawData.length.toLocaleString('es')} líneas</span>
      </div>`;
    document.getElementById('run-btn').disabled = false;
  };
  reader.readAsArrayBuffer(file);
}

// ─── ANALYSIS ──────────────────────────────────────────────────────────────
function runAnalysis() {
  document.getElementById('upload-section').style.display = 'none';
  document.getElementById('results').style.display = 'block';
  document.getElementById('loading-msg').style.display = 'block';
  document.getElementById('analysis-content').style.display = 'none';
  setTimeout(() => {
    analysisResult = analyze(rawData);
    renderResults(analysisResult);
    document.getElementById('loading-msg').style.display = 'none';
    document.getElementById('analysis-content').style.display = 'block';
  }, 50);
}

function getCuenta(row) { return String(row['Cuenta'] || '').trim().replace('.0','').replace(/\..*$/,''); }
function getTipo(row) { return String(row['Tipo'] || '').trim(); }
function getDesc(row) { return String(row['Descripción'] || '').trim(); }
function getAsiento(row) { return String(row['Asiento'] || '').trim(); }
function getNombreCuenta(row) { return String(row['Nombre de la cuenta'] || '').trim(); }
function getFecha(row) {
  const f = row['Fecha'];
  if (!f) return '';
  if (f instanceof Date) return f.toLocaleDateString('es-ES');
  return String(f).split('T')[0];
}
function getDoc(row) { return String(row['Documento'] || '').trim(); }
function getDebe(row) { return parseFloat(row['Debe']) || 0; }
function getHaber(row) { return parseFloat(row['Haber']) || 0; }
function fmtEur(n) { return new Intl.NumberFormat('es-ES', { style: 'currency', currency: 'EUR' }).format(n); }

function analyze(data) {
  const rows = data.filter(r => getCuenta(r) !== '' && getCuenta(r) !== 'undefined');

  // ── CUENTAS CONTABLES ────────────────────────────────────────────────────
  const check1 = rows.filter(r => ['400','4000000'].includes(getCuenta(r)));
  const check2 = rows.filter(r => ['430','4300000'].includes(getCuenta(r)));

  function esIVA(desc) {
    const d = desc.toLowerCase();
    return d.includes('iva') || d.includes('i.v.a') || d.includes('%');
  }
  const check3 = rows.filter(r => (getCuenta(r).startsWith('472') || getCuenta(r).startsWith('477')) && !esIVA(getDesc(r)));

  function esRetencion(desc) {
    const d = desc.toLowerCase();
    return d.includes('retenci') || d.includes('irpf') || d.includes('reten') || d.includes('%');
  }
  const check4 = rows.filter(r => getCuenta(r).startsWith('4751') && !esRetencion(getDesc(r)));

  const check5 = [
    ...rows.filter(r => {
      const c = getCuenta(r);
      if (c.startsWith('472') || c.startsWith('477')) return false;
      const d = getDesc(r).toLowerCase();
      return d.startsWith('iva ') || d.includes('iva 21') || d.includes('iva 10') || d.includes('iva 4%') || /^iva\s+\d+%/.test(d);
    }),
    ...rows.filter(r => {
      const c = getCuenta(r);
      if (c.startsWith('4751')) return false;
      const d = getDesc(r).toLowerCase();
      return (d.includes('retenci') && (d.includes('%') || d.includes('irpf'))) || d.startsWith('irpf');
    })
  ];

  // ── AUDITORÍA ADICIONAL ──────────────────────────────────────────────────

  // A1: Cuadre contable — asientos que no cuadran
  const asientoMap = {};
  rows.forEach(r => {
    const a = getAsiento(r);
    if (!asientoMap[a]) asientoMap[a] = { debe: 0, haber: 0, rows: [] };
    asientoMap[a].debe += getDebe(r);
    asientoMap[a].haber += getHaber(r);
    asientoMap[a].rows.push(r);
  });
  const adicional_a1_raw = Object.entries(asientoMap)
    .filter(([, v]) => Math.abs(v.debe - v.haber) > 0.02)
    .map(([asiento, v]) => ({
      asiento, debe: v.debe, haber: v.haber,
      diff: v.debe - v.haber,
      fecha: getFecha(v.rows[0]),
      tipo: getTipo(v.rows[0]),
      desc: getDesc(v.rows[0]),
      lineas: v.rows.length
    }));

  // A2: Cuadre contable — asientos con una sola línea
  const adicional_a2_raw = Object.entries(asientoMap)
    .filter(([, v]) => v.rows.length === 1)
    .map(([asiento, v]) => v.rows[0]);

  // B1: Tesorería — 572 con contrapartida inesperada
  const gruposEsperados = ['400','410','430','441','472','475','477','6','7','57','52'];
  const asientosCon572 = Object.entries(asientoMap).filter(([, v]) => v.rows.some(r => getCuenta(r).startsWith('572')));
  const adicional_b1_rows = [];
  asientosCon572.forEach(([asiento, v]) => {
    const otras = v.rows.filter(r => !getCuenta(r).startsWith('572'));
    otras.forEach(r => {
      const c = getCuenta(r);
      if (!gruposEsperados.some(g => c.startsWith(g))) {
        adicional_b1_rows.push(r);
      }
    });
  });

  // C1: IVA cruzado — Compras con 472 pero sin línea de gasto 6xx
  const tiposCompra = ['Compra', 'Compra rectificativa'];
  const tiposFactura = ['Factura', 'Venta rectificativa'];
  const adicional_c1_raw = [];
  Object.entries(asientoMap).forEach(([asiento, v]) => {
    if (!tiposCompra.includes(getTipo(v.rows[0]))) return;
    const tiene472 = v.rows.some(r => getCuenta(r).startsWith('472'));
    const tieneGasto = v.rows.some(r => getCuenta(r).startsWith('6'));
    if (tiene472 && !tieneGasto) {
      adicional_c1_raw.push({
        asiento, fecha: getFecha(v.rows[0]), tipo: getTipo(v.rows[0]),
        desc: getDesc(v.rows[0]),
        cuentas: [...new Set(v.rows.map(r => getCuenta(r)))].join(', ')
      });
    }
  });

  // C2: IVA cruzado — Facturas con 477 pero sin línea de ingreso 7xx
  const adicional_c2_raw = [];
  Object.entries(asientoMap).forEach(([asiento, v]) => {
    if (!tiposFactura.includes(getTipo(v.rows[0]))) return;
    const tiene477 = v.rows.some(r => getCuenta(r).startsWith('477'));
    const tieneIngreso = v.rows.some(r => getCuenta(r).startsWith('7'));
    if (tiene477 && !tieneIngreso) {
      adicional_c2_raw.push({
        asiento, fecha: getFecha(v.rows[0]), tipo: getTipo(v.rows[0]),
        desc: getDesc(v.rows[0]),
        cuentas: [...new Set(v.rows.map(r => getCuenta(r)))].join(', ')
      });
    }
  });

  // C3: IVA no cuadra vs base (parsear descripción)
  const ivaRe = /IVA\s+(\d+)%\s*\(([0-9.,]+)\)/i;
  const adicional_c3_raw = [];
  rows.forEach(r => {
    const c = getCuenta(r);
    const isIVASoportado = c.startsWith('472');
    const isIVARepercutido = c.startsWith('477');
    if (!isIVASoportado && !isIVARepercutido) return;
    const desc = getDesc(r);
    const m = desc.match(ivaRe);
    if (!m) return;
    const tipoPct = parseFloat(m[1]) / 100;
    const baseDesc = parseFloat(m[2].replace(',','.'));
    const ivaEsperado = Math.round(baseDesc * tipoPct * 100) / 100;
    const ivaContab = Math.abs(isIVASoportado ? getDebe(r) : getHaber(r));
    const diff = Math.abs(ivaContab - ivaEsperado);
    if (diff > 0.02) {
      adicional_c3_raw.push({
        asiento: getAsiento(r), fecha: getFecha(r), tipo: getTipo(r),
        cuenta: c, nombreCuenta: getNombreCuenta(r), desc,
        tipoPct: `${m[1]}%`, baseDesc, ivaEsperado, ivaContab, diff
      });
    }
  });

  // ── FACTURAS DUPLICADAS PIGEON ───────────────────────────────────────────

  // Extraer una fila por asiento pigeon: proveedor, importe, fecha, doc
  const asientosPigeon = Object.keys(asientoMap).filter(a =>
    asientoMap[a].rows.some(r => getCuenta(r) === '62300001')
  );

  const pigeonFacturas = asientosPigeon.map(a => {
    const v = asientoMap[a];
    const gastoRow = v.rows.find(r => getCuenta(r) === '62300001');
    const provRow = v.rows.find(r => getCuenta(r).startsWith('400'));
    if (!gastoRow) return null;
    const importe = Math.round(getDebe(gastoRow) * 100) / 100;
    const fechaRaw = gastoRow['Fecha'];
    const fechaStr = getFecha(gastoRow);
    // Fecha solo día (sin hora) para comparar
    const fechaDia = fechaRaw instanceof Date
      ? fechaRaw.toISOString().split('T')[0]
      : String(fechaRaw).split('T')[0].split(' ')[0];
    const doc = String(v.rows[0]['Documento'] || '').trim();
    return {
      asiento: a,
      fecha: fechaStr,
      fechaDia,
      provCuenta: provRow ? getCuenta(provRow) : '',
      proveedor: provRow ? getNombreCuenta(provRow) : '',
      importe,
      desc: getDesc(gastoRow),
      doc
    };
  }).filter(Boolean);

  // D1: Mismo proveedor + mismo documento → duplicado casi seguro
  const dup_d1_grupos = {};
  pigeonFacturas.forEach(f => {
    if (!f.doc) return;
    const k = `${f.provCuenta}||${f.doc}`;
    if (!dup_d1_grupos[k]) dup_d1_grupos[k] = [];
    dup_d1_grupos[k].push(f);
  });
  const dup_d1 = Object.values(dup_d1_grupos)
    .filter(g => g.length > 1)
    .map(g => g.map((f, i) => ({ ...f, grupo: i === 0 ? '🔴 Duplicado' : '🔴 Duplicado', nGrupo: g.length })))
    .flat();

  // D2: Mismo proveedor + mismo importe + misma fecha → muy sospechoso
  const dup_d2_grupos = {};
  pigeonFacturas.forEach(f => {
    const k = `${f.provCuenta}||${f.importe}||${f.fechaDia}`;
    if (!dup_d2_grupos[k]) dup_d2_grupos[k] = [];
    dup_d2_grupos[k].push(f);
  });
  // Excluir los que ya están en D1
  const d1AsientoSet = new Set(dup_d1.map(f => f.asiento));
  const dup_d2 = Object.values(dup_d2_grupos)
    .filter(g => g.length > 1 && !g.every(f => d1AsientoSet.has(f.asiento)))
    .map(g => g.map(f => ({ ...f, nGrupo: g.length })))
    .flat()
    .filter(f => !d1AsientoSet.has(f.asiento));

  // D3: Mismo proveedor + mismo importe + distinta fecha → posible (trabajo diferente, revisar)
  const dup_d3_grupos = {};
  pigeonFacturas.forEach(f => {
    const k = `${f.provCuenta}||${f.importe}`;
    if (!dup_d3_grupos[k]) dup_d3_grupos[k] = [];
    dup_d3_grupos[k].push(f);
  });
  const d2AsientoSet = new Set(dup_d2.map(f => f.asiento));
  const dup_d3 = Object.values(dup_d3_grupos)
    .filter(g => {
      if (g.length < 2) return false;
      const fechas = [...new Set(g.map(f => f.fechaDia))];
      return fechas.length > 1; // distintas fechas
    })
    .map(g => g.map(f => ({ ...f, nGrupo: g.length })))
    .flat()
    .filter(f => !d1AsientoSet.has(f.asiento) && !d2AsientoSet.has(f.asiento));

  const dupChecks = [
    {
      id: 'd1',
      title: 'Mismo proveedor + mismo documento',
      desc: 'La combinación proveedor + número de documento debería ser única. Estos casos son duplicados casi seguros que hay que investigar y anular.',
      issues: dup_d1,
      isCustom: true,
      renderRow: f => `<tr style="background:rgba(240,100,100,0.04)">
        <td class="mono">${f.asiento}</td>
        <td>${f.fecha}</td>
        <td class="highlight">${f.proveedor}</td>
        <td class="mono">${f.provCuenta}</td>
        <td class="mono" style="color:var(--error);font-weight:600">${fmtEur(f.importe)}</td>
        <td class="mono" style="color:var(--error)">${f.doc}</td>
        <td style="color:var(--text3);font-size:11px">${f.desc.substring(0,50)}${f.desc.length>50?'…':''}</td>
      </tr>`,
      headers: ['Asiento','Fecha','Proveedor','Cuenta','Importe','Documento','Descripción']
    },
    {
      id: 'd2',
      title: 'Mismo proveedor + mismo importe + misma fecha',
      desc: 'Mismo proveedor, mismo importe y misma fecha de contabilización pero documentos distintos. Alta probabilidad de duplicado — verificar si son dos trabajos distintos o la misma factura registrada dos veces.',
      issues: dup_d2,
      isCustom: true,
      renderRow: f => `<tr style="background:rgba(245,166,35,0.03)">
        <td class="mono">${f.asiento}</td>
        <td>${f.fecha}</td>
        <td class="highlight">${f.proveedor}</td>
        <td class="mono">${f.provCuenta}</td>
        <td class="mono" style="color:var(--warn);font-weight:600">${fmtEur(f.importe)}</td>
        <td class="mono">${f.doc}</td>
        <td style="color:var(--text3);font-size:11px">${f.desc.substring(0,50)}${f.desc.length>50?'…':''}</td>
      </tr>`,
      headers: ['Asiento','Fecha','Proveedor','Cuenta','Importe','Documento','Descripción']
    },
    {
      id: 'd3',
      title: 'Mismo proveedor + mismo importe + distinta fecha',
      desc: 'Mismo proveedor e importe pero contabilizadas en fechas distintas. Probablemente son encargos legítimos a tarifa fija, pero conviene revisar cuando el importe es elevado o hay muchas repeticiones.',
      issues: dup_d3,
      isCustom: true,
      renderRow: f => `<tr>
        <td class="mono">${f.asiento}</td>
        <td>${f.fecha}</td>
        <td class="highlight">${f.proveedor}</td>
        <td class="mono">${f.provCuenta}</td>
        <td class="mono" style="color:var(--text2)">${fmtEur(f.importe)}</td>
        <td class="mono">${f.doc}</td>
        <td class="mono" style="color:var(--text3)">${f.nGrupo} ocurrencias</td>
        <td style="color:var(--text3);font-size:11px">${f.desc.substring(0,50)}${f.desc.length>50?'…':''}</td>
      </tr>`,
      headers: ['Asiento','Fecha','Proveedor','Cuenta','Importe','Documento','Ocurrencias','Descripción']
    }
  ];

  return {
    totalLineas: rows.length,
    totalAsientos: Object.keys(asientoMap).length,
    totalPigeonFacturas: pigeonFacturas.length,
    checks: [
      {
        id:'c1', title:'Proveedores en cuenta genérica 400',
        desc:'Ninguna factura recibida debe contabilizarse en la cuenta 400 genérica. Cada proveedor tiene su cuenta específica (4000xxxx).',
        issues: check1,
        cols:[
          {label:'Asiento',fn:getAsiento},{label:'Fecha',fn:getFecha},{label:'Tipo',fn:getTipo},
          {label:'Cuenta',fn:getCuenta,cls:'mono'},{label:'Nombre cuenta',fn:getNombreCuenta,cls:'highlight'},
          {label:'Descripción',fn:getDesc},{label:'Debe',fn:r=>fmtEur(getDebe(r)),cls:'mono'},{label:'Haber',fn:r=>fmtEur(getHaber(r)),cls:'mono'}
        ]
      },
      {
        id:'c2', title:'Clientes en cuenta genérica 430',
        desc:'Ninguna factura emitida debe contabilizarse en la cuenta 430 genérica. Cada cliente tiene su cuenta específica (4300xxxx).',
        issues: check2,
        cols:[
          {label:'Asiento',fn:getAsiento},{label:'Fecha',fn:getFecha},{label:'Tipo',fn:getTipo},
          {label:'Cuenta',fn:getCuenta,cls:'mono'},{label:'Nombre cuenta',fn:getNombreCuenta,cls:'highlight'},
          {label:'Descripción',fn:getDesc},{label:'Debe',fn:r=>fmtEur(getDebe(r)),cls:'mono'},{label:'Haber',fn:r=>fmtEur(getHaber(r)),cls:'mono'}
        ]
      },
      {
        id:'c3', title:'Conceptos no-IVA en cuentas 472/477',
        desc:'Las cuentas 472 y 477 solo deben contener apuntes de IVA. Se detectan líneas cuya descripción no corresponde a IVA.',
        issues: check3,
        cols:[
          {label:'Asiento',fn:getAsiento},{label:'Fecha',fn:getFecha},
          {label:'Cuenta',fn:getCuenta,cls:'mono'},{label:'Nombre cuenta',fn:getNombreCuenta},
          {label:'Descripción',fn:getDesc,cls:'highlight'},{label:'Debe',fn:r=>fmtEur(getDebe(r)),cls:'mono'},{label:'Haber',fn:r=>fmtEur(getHaber(r)),cls:'mono'}
        ]
      },
      {
        id:'c4', title:'Conceptos no-retención en cuenta 4751',
        desc:'La cuenta 4751 solo debe contener retenciones/IRPF. Se detectan líneas cuya descripción no corresponde.',
        issues: check4,
        cols:[
          {label:'Asiento',fn:getAsiento},{label:'Fecha',fn:getFecha},
          {label:'Cuenta',fn:getCuenta,cls:'mono'},{label:'Nombre cuenta',fn:getNombreCuenta},
          {label:'Descripción',fn:getDesc,cls:'highlight'},{label:'Debe',fn:r=>fmtEur(getDebe(r)),cls:'mono'},{label:'Haber',fn:r=>fmtEur(getHaber(r)),cls:'mono'}
        ]
      },
      {
        id:'c5', title:'IVA/IRPF en cuentas incorrectas',
        desc:'Se detectan apuntes de IVA fuera de 472/477, o retención/IRPF fuera de 4751.',
        issues: check5,
        cols:[
          {label:'Asiento',fn:getAsiento},{label:'Fecha',fn:getFecha},
          {label:'Cuenta',fn:getCuenta,cls:'mono'},{label:'Nombre cuenta',fn:getNombreCuenta},
          {label:'Descripción',fn:getDesc,cls:'highlight'},
          {label:'Tipo detectado',fn:r=>{
            const d=getDesc(r).toLowerCase();
            if(d.startsWith('iva')||d.includes('iva 2')||d.includes('iva 1'))return '⚠️ IVA fuera de 472/477';
            if(d.includes('retenci')||d.includes('irpf'))return '⚠️ Retención fuera de 4751';
            return '⚠️ Revisar';
          },cls:'highlight'},
          {label:'Debe',fn:r=>fmtEur(getDebe(r)),cls:'mono'},{label:'Haber',fn:r=>fmtEur(getHaber(r)),cls:'mono'}
        ]
      }
    ],
    adicional: {
      checks: [
        {
          id:'a1', title:'Asientos que no cuadran (Debe ≠ Haber)',
          desc:'Todo asiento contable debe tener Debe = Haber. Se muestran los asientos donde existe diferencia superior a 2 céntimos.',
          issues: adicional_a1_raw,
          isCustom: true,
          renderRow: r => `<tr>
            <td class="mono">${r.asiento}</td>
            <td>${r.fecha}</td>
            <td>${r.tipo}</td>
            <td>${r.desc.substring(0,60)}${r.desc.length>60?'…':''}</td>
            <td class="mono">${fmtEur(r.debe)}</td>
            <td class="mono">${fmtEur(r.haber)}</td>
            <td class="mono" style="color:var(--error);font-weight:600">${fmtEur(r.diff)}</td>
            <td class="mono">${r.lineas}</td>
          </tr>`,
          headers: ['Asiento','Fecha','Tipo','Descripción','Debe','Haber','Diferencia','Líneas']
        },
        {
          id:'a2', title:'Asientos con una sola línea contable',
          desc:'Un asiento válido debe tener al menos 2 líneas (partida doble). Los asientos con una sola línea son habitualmente errores de registro.',
          issues: adicional_a2_raw,
          cols:[
            {label:'Asiento',fn:getAsiento},{label:'Fecha',fn:getFecha},{label:'Tipo',fn:getTipo},
            {label:'Cuenta',fn:getCuenta,cls:'mono'},{label:'Nombre cuenta',fn:getNombreCuenta,cls:'highlight'},
            {label:'Descripción',fn:getDesc},{label:'Debe',fn:r=>fmtEur(getDebe(r)),cls:'mono'},{label:'Haber',fn:r=>fmtEur(getHaber(r)),cls:'mono'}
          ]
        },
        {
          id:'b1', title:'Tesorería 572 con contrapartida inesperada',
          desc:'Los movimientos bancarios (572) deben tener contrapartida en cuentas de proveedores (400x), clientes (430x), gastos (6xx), ingresos (7xx) u otra cuenta bancaria (572/52). Se señalan contrapartidas fuera de estos grupos.',
          issues: adicional_b1_rows,
          cols:[
            {label:'Asiento',fn:getAsiento},{label:'Fecha',fn:getFecha},{label:'Tipo',fn:getTipo},
            {label:'Cuenta',fn:getCuenta,cls:'mono'},{label:'Nombre cuenta',fn:getNombreCuenta,cls:'highlight'},
            {label:'Descripción',fn:getDesc},{label:'Debe',fn:r=>fmtEur(getDebe(r)),cls:'mono'},{label:'Haber',fn:r=>fmtEur(getHaber(r)),cls:'mono'}
          ]
        },
        {
          id:'c1', title:'Compras con IVA (472) sin cuenta de gasto (6xx)',
          desc:'Todo asiento de Compra que tenga IVA soportado en 472 debería tener al menos una línea de gasto en cuentas 6xx. Si falta, puede ser un error de clasificación.',
          issues: adicional_c1_raw,
          isCustom: true,
          renderRow: r => `<tr>
            <td class="mono">${r.asiento}</td>
            <td>${r.fecha}</td>
            <td>${r.tipo}</td>
            <td>${r.desc.substring(0,70)}${r.desc.length>70?'…':''}</td>
            <td class="mono" style="color:var(--warn);font-size:11px">${r.cuentas}</td>
          </tr>`,
          headers: ['Asiento','Fecha','Tipo','Descripción','Cuentas del asiento']
        },
        {
          id:'c2', title:'Facturas con IVA (477) sin cuenta de ingreso (7xx)',
          desc:'Todo asiento de Factura que tenga IVA repercutido en 477 debería tener al menos una línea de ingreso en cuentas 7xx.',
          issues: adicional_c2_raw,
          isCustom: true,
          renderRow: r => `<tr>
            <td class="mono">${r.asiento}</td>
            <td>${r.fecha}</td>
            <td>${r.tipo}</td>
            <td>${r.desc.substring(0,70)}${r.desc.length>70?'…':''}</td>
            <td class="mono" style="color:var(--warn);font-size:11px">${r.cuentas}</td>
          </tr>`,
          headers: ['Asiento','Fecha','Tipo','Descripción','Cuentas del asiento']
        },
        {
          id:'c3', title:'IVA contabilizado no cuadra con la base',
          desc:'Se compara el IVA contabilizado en 472/477 con el que debería corresponder según la base y el tipo indicados en la descripción (p.ej. "IVA 21% (100)"). Diferencias superiores a 2 céntimos se señalan como incidencia.',
          issues: adicional_c3_raw,
          isCustom: true,
          renderRow: r => `<tr>
            <td class="mono">${r.asiento}</td>
            <td>${r.fecha}</td>
            <td>${r.cuenta}</td>
            <td>${r.desc.substring(0,60)}${r.desc.length>60?'…':''}</td>
            <td class="mono">${r.tipoPct}</td>
            <td class="mono">${fmtEur(r.baseDesc)}</td>
            <td class="mono">${fmtEur(r.ivaEsperado)}</td>
            <td class="mono" style="color:var(--error)">${fmtEur(r.ivaContab)}</td>
            <td class="mono" style="color:var(--error);font-weight:600">${fmtEur(r.diff)}</td>
          </tr>`,
          headers: ['Asiento','Fecha','Cuenta','Descripción','Tipo IVA','Base (desc.)','IVA esperado','IVA contabilizado','Diferencia']
        }
      ]
    },
    duplicados: {
      checks: dupChecks
    }
  };
}

// ─── RENDER ────────────────────────────────────────────────────────────────
const panelState = {};

function renderResults(res) {
  // Summary cuentas
  const totalIssues = res.checks.reduce((s,c) => s + c.issues.length, 0);
  const checksOk = res.checks.filter(c => c.issues.length === 0).length;
  document.getElementById('summary-grid').innerHTML = `
    <div class="stat-card"><div class="label">Líneas procesadas</div><div class="value neutral">${res.totalLineas.toLocaleString('es')}</div><div class="sub">${res.totalAsientos.toLocaleString('es')} asientos</div></div>
    <div class="stat-card"><div class="label">Checks realizados</div><div class="value neutral">5</div><div class="sub">controles contables</div></div>
    <div class="stat-card"><div class="label">Checks OK</div><div class="value ${checksOk===5?'ok':'warn'}">${checksOk}/5</div><div class="sub">sin incidencias</div></div>
    <div class="stat-card"><div class="label">Incidencias</div><div class="value ${totalIssues===0?'ok':'error'}">${totalIssues}</div><div class="sub">líneas a revisar</div></div>
  `;

  // Summary adicional
  const addChecks = res.adicional.checks;
  const totalAddIssues = addChecks.reduce((s,c) => s + c.issues.length, 0);
  const addChecksOk = addChecks.filter(c => c.issues.length === 0).length;
  document.getElementById('summary-grid-adicional').innerHTML = `
    <div class="stat-card"><div class="label">Líneas procesadas</div><div class="value neutral">${res.totalLineas.toLocaleString('es')}</div><div class="sub">${res.totalAsientos.toLocaleString('es')} asientos</div></div>
    <div class="stat-card"><div class="label">Checks realizados</div><div class="value neutral">6</div><div class="sub">controles adicionales</div></div>
    <div class="stat-card"><div class="label">Checks OK</div><div class="value ${addChecksOk===6?'ok':'warn'}">${addChecksOk}/6</div><div class="sub">sin incidencias</div></div>
    <div class="stat-card"><div class="label">Incidencias</div><div class="value ${totalAddIssues===0?'ok':'error'}">${totalAddIssues}</div><div class="sub">asientos/líneas a revisar</div></div>
  `;

  // Render tabs — Cuentas
  renderTabSet('tabs-bar', 'tabs-content', res.checks, 'cc');
  panelState['cc_0'] = { page:0, filter:'' };
  setTimeout(() => renderPage('cc', 0, res.checks), 10);

  // Summary duplicados
  const dupChecksArr = res.duplicados.checks;
  const totalDupIssues = dupChecksArr.reduce((s,c) => s + c.issues.length, 0);
  const dupD1 = dupChecksArr[0].issues.length;
  const dupD2 = dupChecksArr[1].issues.length;
  document.getElementById('summary-grid-dup').innerHTML = `
    <div class="stat-card"><div class="label">Facturas Pigeon</div><div class="value neutral">${res.totalPigeonFacturas.toLocaleString('es')}</div><div class="sub">en este período</div></div>
    <div class="stat-card"><div class="label">Duplicados seguros</div><div class="value ${dupD1===0?'ok':'error'}">${dupD1}</div><div class="sub">mismo doc + proveedor</div></div>
    <div class="stat-card"><div class="label">Alta sospecha</div><div class="value ${dupD2===0?'ok':'warn'}">${dupD2}</div><div class="sub">mismo importe + fecha</div></div>
    <div class="stat-card"><div class="label">Total a revisar</div><div class="value ${totalDupIssues===0?'ok':'warn'}">${totalDupIssues}</div><div class="sub">registros señalados</div></div>
  `;

  // Render tabs — Duplicados
  renderTabSet('tabs-bar-dup', 'tabs-content-dup', dupChecksArr, 'dup');
  panelState['dup_0'] = { page:0, filter:'' };
  setTimeout(() => renderPage('dup', 0, dupChecksArr), 10);

  // Show export button
  document.getElementById('export-btn').classList.add('visible');
}

function getChecksForPrefix(prefix) {
  if (prefix==='cc') return analysisResult.checks;
  if (prefix==='ad') return analysisResult.adicional.checks;
  if (prefix==='dup') return analysisResult.duplicados.checks;
  return [];
}

function renderTabSet(barId, contentId, checks, prefix) {
  const bar = document.getElementById(barId);
  const content = document.getElementById(contentId);
  bar.innerHTML = ''; content.innerHTML = '';

  const labels = {
    'a1':'Cuadre contable','a2':'Asiento 1 línea',
    'b1':'Tesorería 572',
    'c1': prefix==='ad' ? 'Compras sin gasto' : 'C1',
    'c2': prefix==='ad' ? 'Facturas sin ingreso' : 'C2',
    'c3': prefix==='ad' ? 'IVA vs base' : 'C3',
    'd1':'🔴 Mismo doc','d2':'🟡 Misma fecha','d3':'⚪ Distinta fecha'
  };

  checks.forEach((check, idx) => {
    const n = check.issues.length;
    const badgeClass = n===0 ? 'ok-badge' : (check.id==='d3' ? 'ok-badge' : 'error-badge');
    const label = prefix==='cc'
      ? `C${idx+1} ${check.title.split(' ').slice(0,2).join(' ')}`
      : (labels[check.id] || check.id);

    const tab = document.createElement('div');
    tab.className = 'tab' + (idx===0?' active':'');
    tab.innerHTML = `${label} <span class="badge ${badgeClass}">${n===0?'✓':n}</span>`;
    tab.onclick = () => switchTab(prefix, idx);
    bar.appendChild(tab);

    const panel = document.createElement('div');
    panel.className = 'tab-panel' + (idx===0?' active':'');
    panel.id = `panel-${prefix}-${idx}`;
    panel.innerHTML = renderCheckPanel(check, prefix, idx);
    content.appendChild(panel);
  });
}

function switchTab(prefix, idx) {
  const barId = prefix==='cc' ? 'tabs-bar' : prefix==='ad' ? 'tabs-bar-adicional' : 'tabs-bar-dup';
  const bar = document.getElementById(barId);
  bar.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', i===idx));
  document.querySelectorAll(`[id^="panel-${prefix}-"]`).forEach((p,i) => p.classList.toggle('active', i===idx));
  if (!panelState[`${prefix}_${idx}`]) {
    panelState[`${prefix}_${idx}`] = { page:0, filter:'' };
    renderPage(prefix, idx, getChecksForPrefix(prefix));
  }
}

function renderCheckPanel(check, prefix, idx) {
  const n = check.issues.length;
  const statusClass = n===0?'status-ok':'status-error';
  const statusText = n===0?'✓ SIN INCIDENCIAS':`${n} INCIDENCIAS`;
  let content = `
    <div class="check-header">
      <span class="check-icon">${n===0?'✅':'⚠️'}</span>
      <div><h3>${check.title}</h3><p>${check.desc}</p></div>
      <span class="check-status ${statusClass}">${statusText}</span>
    </div>`;

  if (n===0) {
    content += `<div class="table-wrap empty-ok"><span class="no-issues">✓</span> No se han encontrado incidencias en este control</div>`;
  } else {
    const hdrs = check.isCustom ? check.headers : check.cols.map(c=>c.label);
    content += `
      <div class="table-wrap">
        <div class="search-bar">
          <span style="color:var(--text3);font-size:12px">🔍</span>
          <input type="text" placeholder="Filtrar resultados…" id="search-${prefix}-${idx}" oninput="filterTable('${prefix}',${idx})">
          <span class="search-count" id="count-${prefix}-${idx}">${n} resultados</span>
        </div>
        <div style="overflow-x:auto">
        <table id="table-${prefix}-${idx}">
          <thead><tr>${hdrs.map(h=>`<th>${h}</th>`).join('')}</tr></thead>
          <tbody id="tbody-${prefix}-${idx}"></tbody>
        </table>
        </div>
        <div class="pagination" id="pag-${prefix}-${idx}">
          <button onclick="changePage('${prefix}',${idx},-1)" id="prev-${prefix}-${idx}">← Anterior</button>
          <span id="pag-info-${prefix}-${idx}"></span>
          <button onclick="changePage('${prefix}',${idx},1)" id="next-${prefix}-${idx}">Siguiente →</button>
        </div>
      </div>`;
  }
  return content;
}

function filterTable(prefix, idx) {
  const key = `${prefix}_${idx}`;
  if (!panelState[key]) panelState[key] = { page:0, filter:'' };
  panelState[key].filter = document.getElementById(`search-${prefix}-${idx}`).value.toLowerCase();
  panelState[key].page = 0;
  renderPage(prefix, idx, getChecksForPrefix(prefix));
}

function changePage(prefix, idx, dir) {
  const key = `${prefix}_${idx}`;
  panelState[key].page += dir;
  renderPage(prefix, idx, getChecksForPrefix(prefix));
}

function renderPage(prefix, idx, checks) {
  const check = checks[idx];
  const key = `${prefix}_${idx}`;
  const state = panelState[key] || { page:0, filter:'' };
  const filter = state.filter || '';

  let filtered;
  if (check.isCustom) {
    filtered = filter
      ? check.issues.filter(r => Object.values(r).some(v => String(v).toLowerCase().includes(filter)))
      : check.issues;
  } else {
    filtered = filter
      ? check.issues.filter(r => check.cols.some(c => String(c.fn(r)).toLowerCase().includes(filter)))
      : check.issues;
  }

  const total = filtered.length;
  const totalPages = Math.max(1, Math.ceil(total / PAGE_SIZE));
  state.page = Math.max(0, Math.min(state.page, totalPages-1));
  const start = state.page * PAGE_SIZE;
  const pageRows = filtered.slice(start, start + PAGE_SIZE);

  const tbody = document.getElementById(`tbody-${prefix}-${idx}`);
  if (!tbody) return;

  if (check.isCustom) {
    tbody.innerHTML = pageRows.map(r => check.renderRow(r)).join('');
  } else {
    tbody.innerHTML = pageRows.map(r =>
      `<tr>${check.cols.map(c=>`<td class="${c.cls||''}">${c.fn(r)}</td>`).join('')}</tr>`
    ).join('');
  }

  const countEl = document.getElementById(`count-${prefix}-${idx}`);
  const pagInfoEl = document.getElementById(`pag-info-${prefix}-${idx}`);
  const prevEl = document.getElementById(`prev-${prefix}-${idx}`);
  const nextEl = document.getElementById(`next-${prefix}-${idx}`);
  if (countEl) countEl.textContent = `${total} resultados`;
  if (pagInfoEl) pagInfoEl.textContent = `Pág. ${state.page+1} / ${totalPages}`;
  if (prevEl) prevEl.disabled = state.page === 0;
  if (nextEl) nextEl.disabled = state.page >= totalPages-1;
}
</script>
